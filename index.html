<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audio.edit</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Segoe UI, Arial, sans-serif;
  background:#eafefe;
  height:100vh;
  overflow:hidden;
}

.app{display:flex;height:100vh}

.sidebar{
  width:340px;
  background:#67d6d6;
  padding:18px;
  display:flex;
  flex-direction:column;
  gap:10px;
  overflow:auto;
}

.logo{font-size:26px;font-weight:800;color:#003f3f}
.version{font-size:12px;color:#004f4f}

.section{
  background:rgba(255,255,255,0.25);
  padding:12px;
  border-radius:12px;
}

button{
  width:100%;
  margin-top:8px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#008c8c;
  color:white;
  cursor:pointer;
}

button:hover{opacity:.9}

input[type=range]{width:100%}
label{font-size:13px;font-weight:600;color:#004f4f}
.value{font-size:12px;color:#003f3f}

.main{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
}

canvas{
  width:92%;
  height:320px;
  background:#001818;
  border-radius:14px;
}
</style>
</head>

<body>

<div class="app">

<div class="sidebar">

  <div class="logo">♪ Audio.edit</div>
  <div class="version">v2.4.1</div>

  <div class="section">
    <input type="file" id="fileInput" accept="audio/*">
  </div>

  <div class="section">
    <label>Speed</label>
    <div class="value" id="speedVal">1.00x</div>
    <input type="range" id="speed" min="0.5" max="2" step="0.01" value="1">

    <label>Bass (dB)</label>
    <div class="value" id="bassVal">0 dB</div>
    <input type="range" id="bass" min="-24" max="24" value="0">

    <label>Reverb (%)</label>
    <div class="value" id="reverbVal">0%</div>
    <input type="range" id="reverb" min="0" max="100" value="0">
  </div>

  <div class="section">
    <button id="nightcore">Nightcore</button>
    <button id="slowed">Slowed + Reverb</button>
    <button id="mall">Mall</button>
  </div>

  <div class="section">
    <button id="play">▶ Play / Pause</button>
  </div>

</div>

<div class="main">
  <canvas id="scope"></canvas>
</div>

</div>

<script>
window.addEventListener("DOMContentLoaded", () => {

let ctx;
let buffer=null;
let source=null;
let playing=false;

let bassFilter, convolver, dryGain, wetGain, analyser;
let dataArray;

// ---------------- INIT ----------------
function init(){
  if(ctx) return;

  ctx = new (window.AudioContext || window.webkitAudioContext)();

  analyser = ctx.createAnalyser();
  analyser.fftSize = 2048;

  setup();
  draw();
}

function setup(){
  bassFilter = ctx.createBiquadFilter();
  bassFilter.type="lowshelf";
  bassFilter.frequency.value=180;

  convolver = ctx.createConvolver();
  convolver.buffer = impulse();

  dryGain = ctx.createGain();
  wetGain = ctx.createGain();

  bassFilter.connect(dryGain);
  bassFilter.connect(convolver);

  convolver.connect(wetGain);

  dryGain.connect(analyser);
  wetGain.connect(analyser);

  analyser.connect(ctx.destination);

  dataArray = new Uint8Array(analyser.frequencyBinCount);
}

// ---------------- IMPULSE ----------------
function impulse(){
  const len=ctx.sampleRate*2.5;
  const b=ctx.createBuffer(2,len,ctx.sampleRate);

  for(let c=0;c<2;c++){
    const d=b.getChannelData(c);
    for(let i=0;i<len;i++){
      d[i]=(Math.random()*2-1)*Math.pow(1-i/len,2.5);
    }
  }
  return b;
}

// ---------------- ELEMENTS ----------------
const fileInput=document.getElementById("fileInput");
const playBtn=document.getElementById("play");
const speed=document.getElementById("speed");
const bass=document.getElementById("bass");
const reverb=document.getElementById("reverb");

// ---------------- LOAD ----------------
fileInput.onchange = async e=>{
  const f=e.target.files[0];
  if(!f) return;

  init();

  const arr=await f.arrayBuffer();
  buffer=await ctx.decodeAudioData(arr);

  playing=false;
  playBtn.textContent="▶ Play / Pause";
};

// ---------------- PLAY ----------------
playBtn.onclick = async ()=>{
  if(!buffer) return;

  init();
  await ctx.resume();

  if(playing && source){
    source.stop();
    playing=false;
    playBtn.textContent="▶ Play / Pause";
    return;
  }

  source = ctx.createBufferSource();
  source.buffer = buffer;

  source.playbackRate.value = parseFloat(speed.value);

  bassFilter.gain.value = parseFloat(bass.value);

  const rev = parseFloat(reverb.value)/100;
  dryGain.gain.value = 1-rev;
  wetGain.gain.value = rev;

  source.connect(bassFilter);
  source.start();

  playing=true;
  playBtn.textContent="⏸ Pause";

  source.onended=()=>{
    playing=false;
    playBtn.textContent="▶ Play / Pause";
  };
};

// ---------------- UI ----------------
speed.oninput=e=>speedVal.textContent=(+e.target.value).toFixed(2)+"x";
bass.oninput=e=>bassVal.textContent=e.target.value+" dB";
reverb.oninput=e=>reverbVal.textContent=e.target.value+"%";

// ---------------- PRESETS ----------------
nightcore.onclick=()=>{
  speed.value=1.25;
  bass.value=6;
  reverb.value=10;
  speed.oninput();bass.oninput();reverb.oninput();
};

slowed.onclick=()=>{
  speed.value=0.85;
  bass.value=2;
  reverb.value=35;
  speed.oninput();bass.oninput();reverb.oninput();
};

mall.onclick=()=>{
  speed.value=0.95;
  bass.value=20;
  reverb.value=90;
  speed.oninput();bass.oninput();reverb.oninput();
};

// ---------------- VISUALIZER ----------------
const canvas=document.getElementById("scope");
const c=canvas.getContext("2d");

function draw(){
  requestAnimationFrame(draw);
  if(!analyser) return;

  analyser.getByteTimeDomainData(dataArray);

  c.fillStyle="#001818";
  c.fillRect(0,0,canvas.width,canvas.height);

  c.strokeStyle="#00ffd5";
  c.lineWidth=2;
  c.beginPath();

  let x=0;
  let slice=canvas.width/dataArray.length;

  for(let i=0;i<dataArray.length;i++){
    let y=(dataArray[i]/128)*canvas.height/2;

    if(i===0)c.moveTo(x,y);
    else c.lineTo(x,y);

    x+=slice;
  }

  c.stroke();
}

});
</script>

</body>
</html>
